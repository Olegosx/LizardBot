<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LizardBot — Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: #111317;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 340px;
      background: #1a1d23;
      border: 1px solid #2d3139;
      border-radius: 0.5rem;
    }
    .form-control {
      background: #22262e;
      border-color: #2d3139;
      color: #d1d5db;
    }
    .form-control:focus {
      background: #22262e;
      border-color: #3b82f6;
      color: #d1d5db;
      box-shadow: 0 0 0 0.2rem rgba(59,130,246,0.2);
    }
  </style>
</head>
<body>
  <div class="login-card shadow-lg p-4">
    <div class="text-center mb-4">
      <i class="bi bi-activity text-success fs-2"></i>
      <h5 class="mt-2 mb-0 fw-bold" style="color:#f1f5f9;">LizardBot</h5>
      <p class="small mt-1 mb-0" style="color:#9ca3af;">Панель управления</p>
    </div>

    <div id="login-error" class="alert alert-danger py-2 small d-none mb-3">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>Неверный логин или пароль
    </div>

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label small" style="color:#9ca3af;" for="username">Логин</label>
        <input type="text" id="username" name="username"
               class="form-control" autocomplete="username" required autofocus />
      </div>
      <div class="mb-4">
        <label class="form-label small" style="color:#9ca3af;" for="password">Пароль</label>
        <input type="password" id="password" name="password"
               class="form-control" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Войти
      </button>
    </form>
  </div>

  <script>
    if (new URLSearchParams(location.search).has('error')) {
      document.getElementById('login-error').classList.remove('d-none');
    }
  </script>
</body>
</html>
